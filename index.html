<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internship Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
<div id="vanta-login" class="login-vanta-page">

        <div class="login-box shadow-sm p-5">
            <h2 class="fw-bold mb-2">Login to your account</h2>
            <p class="text-muted mb-4">Enter your details to continue</p>

            <form id="loginForm" action="#" method="post">

                <div class="mb-3">
                    <label class="form-label" for="username">Username</label>
                    <input 
                        type="text" 
                        name="username" 
                        id="username" 
                        class="form-control" 
                        placeholder="Enter Name" 
                        required>
                </div>

                <div class="mb-3">
                    <label class="form-label" for="password">Password</label>

                    <div class="password-wrapper">
                        <input 
                            type="password" 
                            name="password" 
                            id="password" 
                            class="form-control" 
                            placeholder="Enter Password" 
                            required>

                        <span id="togglePassword" class="password-toggle">
                            <i class="bi bi-eye" id="eyeIcon"></i>
                        </span>
                    </div>
                </div>

                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="rememberMe">
                    <label class="form-check-label" for="rememberMe">Remember me</label>
                </div>

                <div class="d-flex gap-2">
                    <a href="signup.html" class="btn btn-outline-success flex-fill py-2">
                        Sign Up
                    </a>

                    <button type="submit" class="btn btn-primary flex-fill py-2 shadow-sm">
                        Login
                    </button>
                </div>
            </form>
            
    <script>
    document.addEventListener('DOMContentLoaded', function () {
        const togglePassword = document.querySelector('#togglePassword');
        const passwordInput = document.querySelector('#password');
        const eyeIcon = document.querySelector('#eyeIcon');

        togglePassword.addEventListener('click', function () {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);

            eyeIcon.classList.toggle('bi-eye');
            eyeIcon.classList.toggle('bi-eye-slash');
        });
    });
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>

    <script>
    document.addEventListener("DOMContentLoaded", function () {
        VANTA.NET({
            el: "#vanta-login",
            mouseControls: true,
            touchControls: true,
            gyroControls: false,
            minHeight: 200.00,
            minWidth: 200.00,
            scale: 1.00,
            scaleMobile: 1.00,
            color: 0x7c3aed,
            backgroundColor: 0x160b2e,
            points: 12.00,
            maxDistance: 22.00,
            spacing: 18.00
        });
    });
    </script>
</div>
</body>
</html>
